services:
  - type: web
    name: kasdevtech-llm
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: MODEL_URL
        value: https://huggingface.co/bartowski/Qwen2.5-0.5B-Instruct-GGUF/resolve/main/Qwen2.5-0.5B-Instruct-Q4_K_M.gguf
      - key: MODEL_FILE
        value: model.gguf
      - key: MODEL_ALIAS
        value: qwen2.5-0.5b
      - key: CHAT_FORMAT
        value: chatml
      - key: N_CTX
        value: "4096"
      - key: N_THREADS
        value: "4"
      - key: N_BATCH
        value: "256"
      - key: API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
